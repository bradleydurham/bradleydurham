name: Update now page

on:
  schedule:
    - cron: '0 9 * * *' # 9 AM UTC = 5 AM ET
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Fetch calendar and update now.json
        run: node scripts/update-watchlist.mjs
        env:
          ICAL_URL: ${{ secrets.ICAL_URL }}
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/now.json
          git diff --staged --quiet || (git commit -m "chore: update now page from calendar" && git push)
